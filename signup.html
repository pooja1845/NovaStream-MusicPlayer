<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - NovaStream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="glass-background"></div>
    
    <div class="auth-card">
        <div class="logo-area">
            <div class="logo-icon"></div>
            <span class="logo-text">NovaStream</span>
        </div>
        
        <h1>Join the Wave</h1>
        <p>Create your free account today</p>
        
        <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="auth-input" placeholder="Enter your full name" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="auth-input" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" class="auth-input" placeholder="Minimum 8 characters" required>
            </div>
            
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
            <p>Already have an account?</p>
            <a href="login.html"><button class="signup-alt-btn">Log In Here</button></a>
            <p style="margin-top: 20px;"><a href="index.html" style="color:var(--text-secondary); font-weight: 400;">Back to Home</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long.');
                return;
            }
            
            const result = Auth.register(name, email, password);
            
            if (result.success) {
                // Auto-login after signup
                Auth.login(email, password);
                sessionStorage.setItem('login_success', 'true');
                window.location.href = 'index.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
