<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStream - The Future of Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="glass-background"></div>
    <div class="app-container">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <span class="logo-text">NovaStream</span>
            </div>
            <div class="nav-links">
                <ul>
                    <li id="navHome" class="active">Home</li>
                    <li id="navDiscover">Discover</li>
                    <li id="searchItem">
                        <img class="icon" src="img/search.svg" alt="" id="searchIcon">
                        <span id="searchText">Search</span>
                        <input type="text" id="searchInput" placeholder="Search Bollywood..." />
                    </li>
                </ul>
            </div>
            <div class="nav-buttons" id="authButtons">
                <a href="signup.html"><button class="signupbtn">Sign up</button></a>
                <a href="login.html"><button class="loginbtn">Log in</button></a>
                <div class="hamburgerContainer">
                    <img class="icon hamburger" src="img/hamburger.svg" alt="">
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Center Content (Playlists) -->
            <div class="center-content">
                <div class="hero-section">
                    <h1>Welcome into the <span class="accent">Aura</span></h1>
                    <p>Discover your favorite Bollywood tracks.</p>
                </div>
                
                <div class="spotifyPlaylists">
                    <h2>Bollywood Sets</h2>
                    <div class="cardContainer">
                        <!-- Cards injected here -->
                    </div>
                </div>
            </div>

            <!-- Right Sidebar (Library) -->
            <aside class="left library-sidebar">
                <div class="close-sidebar">
                    <img class="icon close" src="img/close.svg" alt="close">
                </div>
                <div class="heading">
                    <img class="icon" src="img/playlist.svg" alt="playlist">
                    <h2>Your Library</h2>
                </div>
                <div class="songlist">
                    <ul>
                        <!-- Songs injected here -->
                    </ul>
                </div>
            </aside>
        </main>

        <!-- Floating Player Widget -->
        <!-- Floating Player Widget -->
        <div class="now-playing-bar">
            <div class="songInfoWrapper">
                <img id="playerCover" src="img/music.svg" alt="cover">
                <div class="songInfo"></div>
            </div>
            <div class="playerControls">
                <div class="playbutton">
                    <img class="icon" id="previous" src="img/prevsong.svg" alt="prev">
                    <img class="icon play-btn" id="play" src="img/play.svg" alt="play">
                    <img class="icon" id="next" src="img/nextsong.svg" alt="next">
                </div>
                <div class="progress-container">
                    <span class="songTime">00:00/00:00</span>
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
            <div class="volumeControl timeVol">
                <div class="volume">
                    <img src="img/volume.svg" class="icon" alt="vol">
                    <div class="range">
                        <input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.7">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Welcome Modal -->
    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">✨</div>
            <h2 id="modalWelcome">Successfully Logged In!</h2>
            <p id="modalUserName">Welcome to NovaStream</p>
            <button class="modal-btn" onclick="closeModal()">Start Listening</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>

</html>
